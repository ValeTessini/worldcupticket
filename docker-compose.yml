services:
  postgres-db:
    image: postgres
    environment:
      POSTGRES_PASSWORD: admin
      POSTGRES_USER: admin
      POSTGRES_DB: ms_users_db
    ports:
      - "5432:5432"

  mongo-db:
    image: mongo:7.0.28
    ports:
      - "27017:27017"

  eureka-server:
    build: ./eureka-server
    ports:
      - "8761:8761"

  ms-users:
    build: ./ms-users
    ports:
      - "8081:8081"
    depends_on:
      - postgres-db
      - eureka-server

  ms-catalog:
    build: ./ms-catalogo
    ports:
      - "8082:8082"
    depends_on:
      - mongo-db
      - eureka-server

  gateway:
    build: ./gateway
    ports:
      - "8080:8080"
    depends_on:
      - eureka-server

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672" # puerto AMQP
      - "15672:15672" # puerto de management
